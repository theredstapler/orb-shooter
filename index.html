<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/orb.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orb Shooter</title>
  <script type="module" crossorigin src="/assets/index-B_voWV3O.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-Dr5oUiah.css">
</head>

<body>
  <div id="ui-layer">
    <div id="crosshair"></div>
    <div id="stats">
      <div id="hp-container">
        <div class="stat-label">HEALTH</div>
        <div class="bar-bg hp-bg">
          <div id="hp-bar-fill" class="bar-fill hp-fill" style="width: 100%;"></div>
        </div>
      </div>
      <div id="ammo-container">
        <div class="stat-label">AMMO</div>
        <div class="bar-bg ammo-bg">
          <div id="ammo-bar-fill" class="bar-fill ammo-fill" style="width: 100%;"></div>
        </div>
      </div>
    </div>
    <div id="boss-ui" style="display: none;">
      <div id="boss-title">BOSS</div>
      <div id="boss-hp-bar-bg">
        <div id="boss-hp-bar-fill"></div>
      </div>
    </div>

    <!-- CLEARED SCREEN -->
    <div id="cleared-screen" style="display: none;">
      <h1 id="cleared-title" style=" margin-top: auto; ">C L E A R E D</h1>
      <p id="cleared-time">Clear Time: <span id="time-value">0.00</span>s</p>
      <div class="cleared-buttons">
        <button id="btn-restart">Restart</button>
      </div>
      <div style="font-family: monospace; margin-top: auto; padding-bottom: 10px; font-size: 18px;">CREATED BY <a
          href="https://www.youtube.com/c/RedStapler_channel">RED STAPLER</a>
      </div>
    </div>

    <!-- GAME OVER SCREEN -->
    <div id="gameover-screen"
      style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.75); flex-direction: column; justify-content: center; align-items: center; z-index: 100; pointer-events: auto; backdrop-filter: blur(4px);">
      <h1
        style="font-size: 64px; color: #ff4444; margin: 0; text-shadow: 0 0 20px rgba(255, 0, 0, 0.5); font-family: monospace; margin-top: auto;">
        G A M E&nbsp;&nbsp;O V E R</h1>
      <div class="cleared-buttons" style="margin-top: 50px;">
        <button id="btn-restart-go">Restart</button>
      </div>
      <div style="font-family: monospace; margin-top: auto; padding-bottom: 10px; font-size: 18px;">CREATED BY <a
          href="https://www.youtube.com/c/RedStapler_channel">RED STAPLER</a>
      </div>
    </div>
  </div>

  <!-- LOADING SCREEN -->
  <div id="loading-screen"
    style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0b0b0b; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; font-family: monospace; font-size: 24px;">
    <div style="margin-bottom: 20px; font-size: 32px; color: #55ccff; text-shadow: 0 0 10px rgba(85,204,255,0.5);">
      INITIALIZING<span class="dots">...</span></div>
    <div><span id="loading-progress">0%</span></div>
  </div>

</body>

</html>
